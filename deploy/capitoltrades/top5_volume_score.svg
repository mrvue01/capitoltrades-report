<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Capitol Trades top 5 volume leaderboard</title>
  <desc id="desc">Bar chart of disclosed volume in millions of dollars for five congressional traders, carried forward for the 2026-04-30 5:00am CT review because Capitol Trades public profile pages rendered only the live app shell.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#130d03"/>
      <stop offset="100%" stop-color="#2b1f06"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" x2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fcd34d"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" rx="32" fill="url(#bg)"/>
  <text x="70" y="90" fill="#fff7e6" font-size="34" font-family="Inter,Arial,sans-serif" font-weight="800">Volume leaderboard</text>
  <text x="70" y="126" fill="#e6c98c" font-size="20" font-family="Inter,Arial,sans-serif">Latest verified public disclosed volume, carried forward in the 2026-04-30 5:00am CT review</text>
  <g font-family="Inter,Arial,sans-serif" font-size="22" fill="#fff7e6">
    <text x="70" y="210">Michael McCaul</text>
    <rect x="310" y="182" width="760" height="46" rx="16" fill="rgba(255,255,255,0.08)"/>
    <rect x="310" y="182" width="760" height="46" rx="16" fill="url(#bar)"/>
    <text x="1090" y="213" text-anchor="end" fill="#ffffff" font-weight="700">$514.65M</text>

    <text x="70" y="300">Ro Khanna</text>
    <rect x="310" y="272" width="310" height="46" rx="16" fill="rgba(255,255,255,0.08)"/>
    <rect x="310" y="272" width="310" height="46" rx="16" fill="url(#bar)"/>
    <text x="640" y="303" text-anchor="end" fill="#ffffff" font-weight="700">$210.40M</text>

    <text x="70" y="390">Josh Gottheimer</text>
    <rect x="310" y="362" width="273" height="46" rx="16" fill="rgba(255,255,255,0.08)"/>
    <rect x="310" y="362" width="273" height="46" rx="16" fill="url(#bar)"/>
    <text x="603" y="393" text-anchor="end" fill="#ffffff" font-weight="700">$184.80M</text>

    <text x="70" y="480">Suzan DelBene</text>
    <rect x="310" y="452" width="63" height="46" rx="16" fill="rgba(255,255,255,0.08)"/>
    <rect x="310" y="452" width="63" height="46" rx="16" fill="url(#bar)"/>
    <text x="393" y="483" text-anchor="end" fill="#ffffff" font-weight="700">$42.96M</text>

    <text x="70" y="570">Mark Green</text>
    <rect x="310" y="542" width="12" height="46" rx="16" fill="rgba(255,255,255,0.08)"/>
    <rect x="310" y="542" width="12" height="46" rx="16" fill="url(#bar)"/>
    <text x="342" y="573" text-anchor="end" fill="#ffffff" font-weight="700">$8.34M</text>
  </g>
  <text x="70" y="660" fill="#e6c98c" font-size="18" font-family="Inter,Arial,sans-serif">Capitoltrades.com public profile totals; 2026-04-30 review returned app shell, so latest verified readable totals were carried forward.</text>
</svg>